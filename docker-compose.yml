version: "3.9"

services:

  db:

    image: postgres:15

    container_name: asset_db

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:

    build: .

    container_name: asset_api

    depends_on:

      db:
        condition: service_healthy

    env_file:
      - .env

    ports:
      - "8000:8000"

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

volumes:

  postgres_data: